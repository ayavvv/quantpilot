# QuantPilot Mac mini — 交易 + 报告
#
# Usage:
#   docker compose -f docker-compose.mac.yml run --rm trader
#   docker compose -f docker-compose.mac.yml run --rm reporter
#
# 推理已迁移到宿主机 venv (避免 Rosetta x86 OOM)
# 调度已迁移到宿主机 crontab
# OpenD 运行在宿主机 127.0.0.1:11111, trader 通过 host.docker.internal 访问

services:
  # --- 模拟盘交易 ---
  trader:
    build:
      context: .
      dockerfile: trader/Dockerfile
    container_name: quantpilot-trader
    restart: "no"
    network_mode: host
    environment:
      - TZ=Asia/Shanghai
      - FUTU_HOST=${FUTU_HOST:-192.168.100.248}
      - FUTU_PORT=${FUTU_PORT:-11111}
      - FUTU_SIM_ACC_ID=${FUTU_SIM_ACC_ID:-0}
      - FUTU_RSA_KEY=/run/secrets/futu_rsa_key.pem
      - PRED_PATH=/data/signals/pred_sh_latest.pkl
      - QLIB_DATA_DIR=/qlib_data
      - SIGNAL_DIR=/data/signals
      - TOP_N=${TOP_N:-5}
      - HOLD_BONUS=${HOLD_BONUS:-0.05}
      - STOP_LOSS_PCT=${STOP_LOSS_PCT:--0.08}
      - DRY_RUN=${DRY_RUN:-false}
      - ALLOW_OFF_HOURS_TRADING=${ALLOW_OFF_HOURS_TRADING:-false}
    volumes:
      - quant_data:/data
      - ~/quantpilot_data/qlib_data:/qlib_data:ro
      - ${FUTU_RSA_KEY:-/dev/null}:/run/secrets/futu_rsa_key.pem:ro

  # --- 每日邮件报告 ---
  reporter:
    build:
      context: .
      dockerfile: reporter/Dockerfile
    container_name: quantpilot-reporter
    restart: "no"
    environment:
      - TZ=Asia/Shanghai
      - QLIB_DATA_DIR=/qlib_data
      - TRADE_LOG=/app_logs/trade.log
    env_file:
      - ./reporter/.env
    volumes:
      - quant_data:/data
      - ~/quantpilot_data/qlib_data:/qlib_data:ro
      - ./logs:/app_logs:ro

volumes:
  quant_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/quantpilot_data
