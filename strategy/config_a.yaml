# Qlib 全 A 股配置：LightGBM + Alpha158Fund
# 数据目录：~/.qlib/qlib_data/my_quant_data（经过过滤的 A 股）
# 过滤规则：剔除 ST、次新股（<1年）、日均成交额 <5000万

qlib_init:
  provider_uri: "~/.qlib/qlib_data/my_quant_data"
  region: cn

market: &market all
benchmark: &benchmark SH000300

data_handler_config: &data_handler_config
  start_time: 2017-07-01
  end_time: 2026-12-31
  fit_start_time: 2017-07-01
  fit_end_time: 2025-12-31
  instruments: *market

task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      colsample_bytree: 0.85
      learning_rate: 0.05
      subsample: 0.85
      lambda_l1: 10.0
      lambda_l2: 20.0
      max_depth: 7
      num_leaves: 127
      num_threads: 8
      num_boost_round: 500
      early_stopping_rounds: 50
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158Fund
        module_path: strategy.alpha_hk
        kwargs: *data_handler_config
      segments:
        train: [2018-01-01, 2024-06-30]
        valid: [2024-07-01, 2025-06-30]
        test:  [2025-07-01, 2026-12-31]
