# Qlib 工作流配置：LightGBM + Alpha158
# 数据路径在 StrategyEngine 中通过 provider_uri 覆盖

qlib_init:
  provider_uri: "~/.qlib/qlib_data/my_quant_data"
  region: cn

# 使用 all：转换器只生成 instruments/all.txt（含全部 Parquet 股票）
# 若日后有 csi300 成分表，可改为 csi300 并生成 instruments/csi300.txt
market: &market all
benchmark: &benchmark SH000300

# 日期需落在 Qlib 数据范围内（与 Parquet 转换后的 calendar 一致）
# 若数据只有近年，请把 start_time / segments 整体后移
data_handler_config: &data_handler_config
  start_time: 2021-01-01
  end_time: 2025-12-31
  fit_start_time: 2021-01-01
  fit_end_time: 2024-12-31
  instruments: *market

task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      colsample_bytree: 0.8879
      learning_rate: 0.2
      subsample: 0.8789
      lambda_l1: 205.6999
      lambda_l2: 580.9768
      max_depth: 8
      num_leaves: 210
      num_threads: 4
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158Fund
        module_path: strategy.alpha_hk
        kwargs: *data_handler_config
      segments:
        train: [2021-01-01, 2023-06-30]
        valid: [2023-07-01, 2024-06-30]
        test: [2024-07-01, 2024-12-31]
