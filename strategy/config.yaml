# Qlib 工作流配置：LightGBM + Alpha158Fund（含 PE/换手率）
# 数据路径在 StrategyEngine 中通过 provider_uri 覆盖

qlib_init:
  provider_uri: "~/.qlib/qlib_data/my_quant_data"
  region: cn

market: &market all
benchmark: &benchmark SH000300

# Handler 日期范围（engine.py 会根据实际日历动态覆盖）
data_handler_config: &data_handler_config
  instruments: *market

task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      colsample_bytree: 0.8879
      learning_rate: 0.05
      subsample: 0.8789
      lambda_l1: 205.6999
      lambda_l2: 580.9768
      max_depth: 6
      num_leaves: 64
      num_threads: 4
      num_boost_round: 2000
      early_stopping_rounds: 100
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158Fund
        module_path: strategy.handler
        kwargs: *data_handler_config
      segments:
        train: [2015-01-01, 2024-06-30]
        valid: [2024-07-01, 2025-06-30]
        test: [2025-07-01, 2026-03-07]
